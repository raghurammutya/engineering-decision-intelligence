name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  scanner-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Compile scanner
        run: |
          python -m py_compile tools/operational_state_scan.py
          python -m py_compile tools/check_report_drift.py
          python -m py_compile tools/autopilot_progress.py
          python -m py_compile edi/__main__.py

      - name: Run regression tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate policy JSON
        run: |
          for policy in policies/*.json; do
            python -m json.tool "$policy" >/dev/null
          done

      - name: Smoke-test self scan
        run: |
          python -m edi self-scan
          test -s reports/self/manifest.json
          test -s reports/self/decision-backlog.md
          test -s reports/self/repository-state-summary.md
          test -s reports/self/github-protection-findings.md
          test -s reports/self/policy-coverage-report.md
          test -s reports/self/evidence-quality-map.md
          test -s reports/self/risk-explanation-map.md
          test -s reports/self/executive-decision-summary.md
          test -s reports/self/finding-family-summary.md
          test -s reports/self/remediation-playbook-map.md
          test -s reports/self/pr-risk-summary.md
          test -s reports/self/graph/entities.json
          test -s reports/self/graph/relationships.json

      - name: Check committed report drift
        run: |
          python tools/check_report_drift.py --reports reports/ml-pilot --repo-root "$PWD"
          python tools/check_report_drift.py --reports reports/self --repo-root "$PWD"

      - name: Check product progress
        run: python -m edi progress --check
