name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  scanner-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile scanner
        run: |
          python -m py_compile tools/operational_state_scan.py
          python -m py_compile tools/check_report_drift.py

      - name: Run regression tests
        run: python -m unittest discover -s tests -p "test_*.py"

      - name: Validate policy JSON
        run: |
          for policy in policies/*.json; do
            python -m json.tool "$policy" >/dev/null
          done

      - name: Smoke-test self scan
        run: |
          python tools/operational_state_scan.py \
            --repo "$PWD" \
            --out /tmp/edi-self-scan \
            --policy policies/autonomy-policy.json \
            --include-tools
          test -s /tmp/edi-self-scan/manifest.json
          test -s /tmp/edi-self-scan/decision-backlog.md
          test -s /tmp/edi-self-scan/repository-state-summary.md
          test -s /tmp/edi-self-scan/github-protection-findings.md
          test -s /tmp/edi-self-scan/policy-coverage-report.md
          test -s /tmp/edi-self-scan/evidence-quality-map.md
          test -s /tmp/edi-self-scan/executive-decision-summary.md
          test -s /tmp/edi-self-scan/finding-family-summary.md
          test -s /tmp/edi-self-scan/remediation-playbook-map.md
          test -s /tmp/edi-self-scan/pr-risk-summary.md

      - name: Check committed report drift
        run: |
          python tools/check_report_drift.py --reports reports/ml-pilot --repo-root "$PWD"
          python tools/check_report_drift.py --reports reports/self --repo-root "$PWD"
